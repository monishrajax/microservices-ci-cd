apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  labels:
    app: devops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: app
        # Replaced at deploy time by CI with ghcr.io/<owner>/<repo>:<sha>
        image: __DOCKER_IMAGE__
        ports:
        - containerPort: 3000
