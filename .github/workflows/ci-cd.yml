name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name (GHCR, lowercase)
        run: |
          echo "IMAGE_LOWER=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${IMAGE_LOWER}:${GITHUB_SHA} -t ${IMAGE_LOWER}:latest .

      - name: Run basic test
        run: |
          docker run -d --name test-container -p 3000:3000 ${IMAGE_LOWER}:${GITHUB_SHA}
          sleep 5
          docker ps | grep test-container
          curl -f http://localhost:3000 || exit 1
          docker stop test-container
          docker rm test-container

      - name: Push image to GHCR
        run: |
          docker push ${IMAGE_LOWER}:${GITHUB_SHA}
          docker push ${IMAGE_LOWER}:latest

      - name: Setup kubectl
        if: ${{ vars.ENABLE_K8S_DEPLOY == 'true' }}
        uses: azure/setup-kubectl@v3

      - name: Deploy to Kubernetes
        if: ${{ vars.ENABLE_K8S_DEPLOY == 'true' }}
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          sed -i "s#__DOCKER_IMAGE__#${IMAGE_LOWER}:${GITHUB_SHA}#g" k8s/deployment.yaml
          kubectl apply -f k8s/ --validate=false
          kubectl rollout status deployment/devops-app
          kubectl get pods -l app=devops-app
